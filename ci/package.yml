# Package template - invoked only when the trigger ref is a `v*` tag
# (see azure-pipelines.yml). Produces a downloadable artifact bundle
# with everything a release consumer might want:
#
#   - Win32 binaries:    osdp-parser.exe, osdp-pd-mock.exe,
#                        osdp-acu-mock.exe
#   - Rust crate package: osdp-embedded-X.Y.Z.crate
#
# This template covers the Windows artifacts. Linux ARM64 (osdp-mcp for
# Raspberry Pi) is built by the sibling `package_linux` job via
# package-linux.yml. macOS / Linux-x64 binaries aren't built yet; add
# more jobs alongside when there's demand.

steps:
  # ---- Native Windows binaries via CMake -------------------------------

  - task: CmdLine@2
    displayName: 'CMake configure (Release)'
    inputs:
      script: |
        cmake -S . -B build-release ^
          -DCMAKE_BUILD_TYPE=Release ^
          -DOSDP_BUILD_TESTS=OFF ^
          -DOSDP_BUILD_TOOLS=ON

  - task: CmdLine@2
    displayName: 'CMake build (Release)'
    inputs:
      script: 'cmake --build build-release --config Release'

  # Stage the .exe files into the artifact directory.
  - task: CopyFiles@2
    displayName: 'Stage Windows tool binaries'
    inputs:
      sourceFolder: 'build-release'
      contents: |
        tools/osdp-parser/Release/osdp-parser.exe
        tools/osdp-pd-mock/Release/osdp-pd-mock.exe
        tools/osdp-acu-mock/Release/osdp-acu-mock.exe
      targetFolder: '$(Build.ArtifactStagingDirectory)/tools/win-x64'
      flattenFolders: true

  # ---- Rust crate package ---------------------------------------------
  #
  # `cargo package` produces a `.crate` (gzipped tarball) that crates.io
  # would consume. We don't auto-publish here - that requires a
  # CRATES_IO token and is best done as a manual step with
  # `cargo publish` after reviewing the staged artifact. See
  # docs/PUBLISHING.md.

  - task: CmdLine@2
    displayName: 'rustup update stable'
    inputs:
      script: |
        rustup update stable
        rustup default stable

  - task: PowerShell@2
    displayName: 'Stage vendor-c (for cargo package verify)'
    # cargo package needs the C sources to be inside the crate dir
    # in order to compile the staged tarball during verify. The
    # script copies <repo>/{core,pd,acu}/ into rust/osdp/vendor-c/;
    # build.rs detects the staged layout at compile time. Must run
    # before `cargo package` below.
    inputs:
      filePath: 'scripts/Stage-Crate.ps1'
      pwsh: true

  # --allow-dirty: Stage-Crate.ps1 (above) writes the C source mirror to
  # rust/osdp/vendor-c/ and the README to rust/osdp/README.md, both
  # gitignored transient copies that the package `include` list pulls in.
  # cargo counts those as uncommitted files and refuses to package without
  # this override. They're byte-for-byte copies of the committed
  # core/pd/acu tree at HEAD, so the .crate still snapshots the git state.
  # Matches docs/PUBLISHING.md.
  - task: CmdLine@2
    displayName: 'cargo package osdp-embedded (with verify)'
    inputs:
      script: |
        cargo package --manifest-path rust/osdp/Cargo.toml ^
          --target-dir rust/target/package ^
          --allow-dirty

  - task: CopyFiles@2
    displayName: 'Stage Rust crate package'
    inputs:
      sourceFolder: 'rust/target'
      contents: |
        package/package/*.crate
      targetFolder: '$(Build.ArtifactStagingDirectory)/crates'
      flattenFolders: true

  # ---- Publish ---------------------------------------------------------

  - task: PublishPipelineArtifact@1
    displayName: 'Publish release artifacts'
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)'
      artifactName: 'osdp-embedded-release'

# Linux ARM64 package template — invoked only on a `v*` tag (see
# azure-pipelines.yml's `package_linux` job). Cross-compiles the
# osdp-mcp server for 64-bit Raspberry Pi OS / any aarch64 Linux
# (aarch64-unknown-linux-gnu) on an ubuntu-latest agent and publishes
# the binary as its own pipeline artifact.
#
# Why cross-compile instead of a native ARM64 agent: the windows-latest
# `package` job can't build Linux binaries, and x64 ubuntu-latest is the
# always-available hosted image. The only native dependency is the C core
# (osdp-embedded's build.rs compiles it via the `cc` crate, which honours
# the cargo target triple), so installing the aarch64 cross-gcc is enough.
# osdp-mcp drops serialport's libudev backend (it opens ports by path),
# so there's no arm64 libudev to cross-provide.
#
# Build-only: an x64 agent can't execute the aarch64 binary, so there's
# no verify run here. osdp-mcp is tested natively in build.yml.

steps:
  - task: CmdLine@2
    displayName: 'Install aarch64 cross toolchain'
    inputs:
      script: |
        sudo apt-get update
        sudo apt-get install -y gcc-aarch64-linux-gnu

  - task: CmdLine@2
    displayName: 'rustup stable + aarch64 target'
    inputs:
      script: |
        rustup update stable
        rustup default stable
        rustup target add aarch64-unknown-linux-gnu
        rustc --version

  # The `cc` crate auto-detects aarch64-linux-gnu-gcc for the C core;
  # rustc needs to be told to use it as the link driver for the Rust
  # objects too, hence the CARGO_TARGET_..._LINKER override.
  - task: CmdLine@2
    displayName: 'cargo build osdp-mcp (aarch64-unknown-linux-gnu)'
    env:
      CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
    inputs:
      script: |
        cargo build --manifest-path rust/Cargo.toml -p osdp-mcp \
          --release --target aarch64-unknown-linux-gnu

  - task: CopyFiles@2
    displayName: 'Stage osdp-mcp Linux ARM64 binary'
    inputs:
      sourceFolder: 'rust/target/aarch64-unknown-linux-gnu/release'
      contents: 'osdp-mcp'
      targetFolder: '$(Build.ArtifactStagingDirectory)/tools/linux-arm64'
      flattenFolders: true

  - task: PublishPipelineArtifact@1
    displayName: 'Publish Linux ARM64 artifact'
    inputs:
      targetPath: '$(Build.ArtifactStagingDirectory)'
      artifactName: 'osdp-embedded-linux-arm64'

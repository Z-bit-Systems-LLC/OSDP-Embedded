# OSDP-Embedded — Azure DevOps pipeline.
#
# Layout matches Z-bit Systems' Azure DevOps CI guide
# (https://github.com/Z-bit-Systems-LLC/Guidelines/blob/main/docs/azure-devops-ci-guide.md):
# this file is the entry point that defines triggers and orchestrates
# the two jobs; the steps themselves live in build.yml and package.yml
# templates next to this file.
#
# Trunk-based: every push to `main` runs `build`. Tagging a commit
# `v*` (e.g. `v0.1.0` or `v0.1.0-alpha.2`) additionally runs
# `package` to produce release artifacts.

trigger:
  branches:
    include:
      - main
  tags:
    include:
      - v*

# Default Pull-Request trigger so PRs run the build template too.
pr:
  branches:
    include:
      - main

pool:
  vmImage: 'windows-latest'

variables:
  buildConfiguration: 'Release'

jobs:
  # Build + test, runs on every push and PR.
  - job: build
    displayName: 'Build & Test'
    pool:
      vmImage: 'windows-latest'
    steps:
      - checkout: self
        # The repo currently has no submodules. Keeping
        # `submodules: true` here for forward compat — it's a no-op
        # while .gitmodules doesn't exist, but if we ever vendor a
        # shared library this way we won't have to remember to flip
        # it on.
        submodules: true
      - template: build.yml

  # Cross-compile gate for 64-bit Raspberry Pi (aarch64). Build-only —
  # the x64 agent can't run ARM binaries (see ci/cross-pi.yml). Runs on
  # every push and PR.
  #
  # Runs on the self-hosted Proxmox LXC agent in the `Default` pool. That
  # puts this Linux job on a *self-hosted* parallel slot so it runs
  # concurrently with the Microsoft-hosted Windows `build` job, instead of
  # both queuing on the single free hosted slot. The agent must supply the
  # prerequisites cross-pi.yml can't install for itself: passwordless
  # sudo, cmake, ninja-build (or make), build-essential, git, curl, file,
  # and rustup (stable). cross-pi.yml installs gcc-aarch64, the arm64
  # libudev, and the aarch64 Rust target at runtime (idempotently), so
  # they can later be baked into the LXC template and dropped from here.
  - job: cross_arm64
    displayName: 'Cross-compile (Raspberry Pi / aarch64)'
    pool:
      name: 'Default'
      demands:
        - Agent.OS -equals Linux
    steps:
      - checkout: self
        submodules: true
      - template: cross-pi.yml

  # Package + publish artifacts. Only runs on tagged commits — push
  # a tag like `v0.1.0-alpha.2` to trigger a release build. Gated on
  # both the host build/test and the Pi cross-compile so a release can
  # never publish while the aarch64 target is broken.
  - job: package
    displayName: 'Package & Publish'
    condition: and(succeeded(), startsWith(variables['Build.SourceBranch'], 'refs/tags/v'))
    pool:
      vmImage: 'windows-latest'
    dependsOn:
      - build
      - cross_arm64
    steps:
      - checkout: self
        submodules: true
        persistCredentials: true
        clean: true
      - template: package.yml

  # Note: the Linux ARM64 artifact (osdp-mcp for Raspberry Pi) is no
  # longer a separate job. The `cross_arm64` gate above already
  # cross-compiles that exact binary, so on a `v*` tag it stages and
  # publishes `osdp-embedded-linux-arm64` directly (see cross-pi.yml),
  # avoiding a second toolchain install + cross-compile of the same code.

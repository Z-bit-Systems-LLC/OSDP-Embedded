  Self-contained reader-visual page served by osdp-mcp's UI server
  (src/ui.rs) at GET /. No external assets: it polls GET /api/state and
  drives the reader's status LED bar from the live LED state. Drawn to
  resemble a typical access-control keypad reader (silver bezel, black
  touch face, top LED strip, card-tap icon, 3x4 keypad, bell).
-->
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>OSDP Virtual Reader</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    font: 15px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    color: #d8dde6;
    background: radial-gradient(1200px 800px at 50% -10%, #1b2230, #0c0f15 60%);
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  header {
    width: 100%;
    max-width: 720px;
    padding: 24px 24px 6px;
    text-align: center;
  }
  h1 { font-size: 26px; font-weight: 600; margin: 0; letter-spacing: .3px; }
  /* Single status badge (sits under the reader). Fuses stream health with
     the live OSDP link posture: disconnected / no reader / clear text /
     install (SCBK-D) / secure (operational SCBK, SC1) / secure SC2
     (operational AES-256-GCM SCBK). */
  .statusbadge {
    display: inline-block;
    font-size: 13px;
    padding: 4px 12px;
    border-radius: 999px;
    border: 1px solid #2a3140;
    color: #8a93a4;
    background: rgba(12,15,21,.65);
    letter-spacing: .2px;
  }
  .statusbadge.down    { color: #ff5a8a; border-color: #5a1f33; }
  .statusbadge.idle    { color: #8a93a4; border-color: #2a3140; }
  .statusbadge.clear   { color: #9aa3b4; border-color: #2a3140; }
  .statusbadge.install { color: #ffb02e; border-color: #5a4a1f; }
  .statusbadge.secure  { color: #6ee7a8; border-color: #1f5138; }
  .statusline { display: flex; gap: 8px; align-items: center; justify-content: center; }
  /* ACU polling indicator: a dot + label; pulses green while actively polled. */
  .poll {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 999px;
    border: 1px solid #2a3140;
    color: #8a93a4;
    background: rgba(12,15,21,.65);
  }
  .poll[hidden] { display: none; }
  .poll::before {
    content: '';
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #4d5564;
  }
  .poll.active { color: #6ee7a8; border-color: #1f5138; }
  .poll.active::before {
    background: #2fd27a;
    box-shadow: 0 0 8px #2fd27a;
    animation: pollpulse 1.2s ease-in-out infinite;
  }
  @keyframes pollpulse { 50% { opacity: .3; } }
  /* "configured" posture — a small muted sub-label under the main
     (operational) badge. Collapses when there's nothing to show. */
  .subcaption { font-size: 12px; color: #6b7688; min-height: 1em; }
  .subcaption:empty { display: none; }

  main { padding: 26px 24px 40px; display: flex; flex-direction: column; align-items: center; gap: 16px; }

  /* Silver bezel ----------------------------------------------------- */
  .reader {
    width: 300px;
    padding: 12px;
    border-radius: 26px;
    background: linear-gradient(150deg, #f1f3f6 0%, #c5ccd6 38%, #9aa3b0 100%);
    box-shadow:
      0 1px 0 rgba(255,255,255,.7) inset,
      0 -2px 6px rgba(0,0,0,.25) inset,
      0 34px 70px rgba(0,0,0,.55);
  }
  /* Black touch face ------------------------------------------------- */
  .face {
    position: relative;
    border-radius: 16px;
    padding: 30px 26px 30px;
    background:
      radial-gradient(120% 60% at 50% -10%, #20242b 0%, #0c0e12 55%),
      #0a0c10;
    box-shadow: 0 2px 8px rgba(0,0,0,.6) inset, 0 0 0 1px #000 inset;
  }

  /* Top row: centred status LED strip + buzzer indicator ------------ */
  .top {
    position: relative;
    display: flex;
    align-items: center;
    justify-content: center;   /* keeps the LED bar dead-centre */
    margin: 2px 0 34px;
  }
  .led {
    width: 50%;
    height: 14px;
    border-radius: 8px;
    background: #11151c;
    box-shadow: 0 0 0 1px rgba(0,0,0,.6) inset;
    transition: background .12s ease, box-shadow .12s ease;
  }
  .led.lit {
    background: var(--c);
    box-shadow:
      0 0 16px 2px var(--c),
      0 0 36px 6px color-mix(in srgb, var(--c) 60%, transparent),
      0 0 0 1px rgba(255,255,255,.25) inset;
  }
  /* Buzzer indicator (a speaker that lights + pulses while sounding).
   * Absolutely placed at the right edge so it never shifts the LED bar. */
  .buzzer {
    position: absolute;
    right: 2px;
    top: 50%;
    transform: translateY(-50%);
    width: 28px;
    height: 28px;
    color: rgba(220,226,236,.3);
    transition: color .08s ease, filter .08s ease;
  }
  .buzzer svg { width: 100%; height: 100%; }
  .buzzer.sounding {
    color: #ffd34d;
    filter: drop-shadow(0 0 9px #ffd34d);
    animation: buzz .16s steps(2, jump-none) infinite;
  }
  @keyframes buzz { 50% { opacity: .5; } }

  /* Keypad ----------------------------------------------------------- */
  .keypad {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 18px 8px;
    margin: 0 4px;
  }
  .key {
    appearance: none;
    -webkit-appearance: none;
    background: transparent;
    border: 0;
    border-radius: 12px;
    padding: 6px 0;
    font: inherit;
    font-size: 26px;
    font-weight: 300;
    text-align: center;
    color: rgba(226,230,238,.78);
    text-shadow: 0 1px 1px rgba(0,0,0,.8);
    cursor: pointer;
    user-select: none;
    transition: background .08s ease, transform .05s ease, color .08s ease;
  }
  .key:hover { background: rgba(255,255,255,.05); }
  .key:active,
  .key.pressed {
    background: rgba(110,231,168,.16);
    color: #eef1f6;
    transform: scale(.94);
  }

  .soundbtn {
    font: inherit;
    font-size: 12px;
    color: #cfd6e2;
    background: #161b24;
    border: 1px solid #2a3140;
    border-radius: 999px;
    padding: 5px 12px;
    cursor: pointer;
  }
  .soundbtn:hover { border-color: #3a4356; }
  .soundbtn:active { transform: scale(.95); }
  .soundbtn.flash {
    color: #6ee7a8;
    border-color: #1f5138;
    background: rgba(110,231,168,.14);
  }
  .controls {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
    align-items: center;
  }
  .cardinput {
    font: inherit;
    font-size: 13px;
    width: 116px;
    color: #d8dde6;
    background: #0f131a;
    border: 1px solid #2a3140;
    border-radius: 999px;
    padding: 5px 12px;
  }
  .cardinput:focus { outline: none; border-color: #3a9bff; }
  footer { color: #4d5564; font-size: 12px; padding-bottom: 26px; }
  code { color: #9aa3b2; }
</style>
</head>
<body>
  <header>
    <h1>OSDP Virtual Reader</h1>
  </header>

  <main>
    <div class="reader">
      <div class="face">
        <div class="top">
          <div id="led" class="led"></div>
          <div id="buzzer" class="buzzer" title="buzzer">
            <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
              <path d="M4 9v6h4l5 5V4L8 9H4z"/>
              <path d="M16 8.5a4 4 0 0 1 0 7" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round"/>
              <path d="M18.5 6a7 7 0 0 1 0 12" fill="none" stroke="currentColor"
                    stroke-width="1.8" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <div class="keypad">
          <button class="key" type="button" data-key="1">1</button>
          <button class="key" type="button" data-key="2">2</button>
          <button class="key" type="button" data-key="3">3</button>
          <button class="key" type="button" data-key="4">4</button>
          <button class="key" type="button" data-key="5">5</button>
          <button class="key" type="button" data-key="6">6</button>
          <button class="key" type="button" data-key="7">7</button>
          <button class="key" type="button" data-key="8">8</button>
          <button class="key" type="button" data-key="9">9</button>
          <button class="key" type="button" data-key="*">✱</button>
          <button class="key" type="button" data-key="0">0</button>
          <button class="key" type="button" data-key="#">#</button>
        </div>
      </div>
    </div>

    <div class="statusline">
      <span id="status" class="statusbadge">connecting…</span>
      <span id="polling" class="poll" hidden></span>
    </div>
    <div id="configured" class="subcaption"></div>
    <div class="controls">
      <input id="card" class="cardinput" type="text" inputmode="numeric"
             value="12345" maxlength="20" aria-label="card number" />
      <button id="tap" class="soundbtn" type="button">Tap card</button>
    </div>
    <div class="controls">
      <button id="tamper" class="soundbtn" type="button">⚠ Tamper</button>
      <button id="power-cycle" class="soundbtn" type="button">⏻ Power cycle</button>
    </div>
  </main>

  <footer>live via <code>/api/events</code> · served by osdp-mcp</footer>

<script>
  // OSDP colour codes (spec Table 18) → [css colour, label]. 0 = off.
  const COLORS = {
    0: ['#11151c', 'off'],
    1: ['#ff3b46', 'red'],
    2: ['#2fd27a', 'green'],
    3: ['#ffb02e', 'amber'],
    4: ['#3a9bff', 'blue'],
    5: ['#ef5bd6', 'magenta'],
    6: ['#3ee0e0', 'cyan'],
    7: ['#eef1f6', 'white'],
  };

  const ledEl = document.getElementById('led');
  const statusEl = document.getElementById('status');
  const pollEl = document.getElementById('polling');
  const configuredEl = document.getElementById('configured');

  // Secure Channel mode → [label, css class]. Shared by the operational
  // badge and the configured sub-label.
  const MODE = {
    scbk2:   ['🛡️ Secure SC2', 'secure'],
    scbk:    ['🔒 Secure',     'secure'],
    install: ['🔑 Install',    'install'],
    none:    ['🔓 Clear Text', 'clear'],
  };

  // Stream down → we can't trust anything; show "disconnected" and clear
  // the rest.
  function setStatusDown() {
    statusEl.textContent = 'disconnected';
    statusEl.className = 'statusbadge down';
    pollEl.hidden = true;
    configuredEl.textContent = '';
  }

  // Two statuses plus a polling indicator, all from state.connection:
  //  - #status     = OPERATIONAL posture (live on the wire): the main badge.
  //  - #configured = CONFIGURED posture (what the PD is set up for).
  //  - #polling    = whether the ACU is actively polling.
  function setStatus(conn) {
    if (!conn || !conn.running) {
      statusEl.textContent = 'no reader';
      statusEl.className = 'statusbadge idle';
      pollEl.hidden = true;
      configuredEl.textContent = '';
      return;
    }
    const op = MODE[conn.operational] || MODE.none;
    statusEl.textContent = op[0];
    statusEl.className = 'statusbadge ' + op[1];

    const cfg = MODE[conn.configured] || MODE.none;
    configuredEl.textContent = 'configured: ' + cfg[0];

    pollEl.hidden = false;
    pollEl.textContent = conn.polling ? 'polling' : 'idle';
    pollEl.className = conn.polling ? 'poll active' : 'poll';
  }

  // Pick the reader's status LED: reader 0 / LED 0 if present, else the
  // first LED reported. "To start" the reader has a single status strip.
  function pickLed(leds) {
    if (!leds || leds.length === 0) return null;
    return leds.find(function (l) { return l.reader_no === 0 && l.led_no === 0; }) || leds[0];
  }

  function render(leds) {
    const led = pickLed(leds);
    if (!led || led.color === 0) {
      ledEl.classList.remove('lit');
      ledEl.style.removeProperty('--c');
      return;
    }
    const known = COLORS[led.color];
    const css = known ? known[0] : '#888';
    ledEl.style.setProperty('--c', css);
    ledEl.classList.add('lit');
  }

  // ---- Buzzer: visual pulse + Web Audio beep ------------------------
  const buzzerEl = document.getElementById('buzzer');
  let audioCtx = null, osc = null, gain = null;
  let buzzing = false;

  // Build the buzzer's audio graph on demand. Browsers won't let an
  // AudioContext make noise until a user gesture, so the context starts
  // suspended; the first keypress resumes it. (Muting is left to the
  // browser's own per-tab audio control.) Returns true once the graph is
  // live.
  function ensureAudio() {
    try {
      if (!audioCtx) {
        const Ctx = window.AudioContext || window.webkitAudioContext;
        audioCtx = new Ctx();
        osc = audioCtx.createOscillator();
        gain = audioCtx.createGain();
        osc.type = 'square';
        osc.frequency.value = 2300;     // buzzer-ish
        gain.gain.value = 0;            // silent until sounding
        osc.connect(gain).connect(audioCtx.destination);
        osc.start();
      }
      if (audioCtx.state === 'suspended') audioCtx.resume();
      return true;
    } catch (_) { return false; }       // audio unavailable
  }

  function applyBuzz() {
    buzzerEl.classList.toggle('sounding', buzzing);
    if (buzzing) ensureAudio();
    if (gain && audioCtx) {
      // Short ramp avoids clicks on each beep edge.
      gain.gain.setTargetAtTime(buzzing ? 0.05 : 0, audioCtx.currentTime, 0.004);
    }
  }

  // A short tone for each keypad press — same pitch as the osdp_BUZ buzzer
  // (2300 Hz square), just briefer, so the reader feels like one device.
  // The press is itself a user gesture, so bring the audio graph up here.
  function playKeyBeep() {
    if (!ensureAudio() || !audioCtx) return;
    try {
      const now = audioCtx.currentTime;
      const o = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      o.type = 'square';
      o.frequency.value = 2300;
      g.gain.setValueAtTime(0, now);
      g.gain.linearRampToValueAtTime(0.06, now + 0.005);
      g.gain.setTargetAtTime(0, now + 0.02, 0.02);
      o.connect(g).connect(audioCtx.destination);
      o.start(now);
      o.stop(now + 0.12);
    } catch (_) { /* a missed beep is harmless */ }
  }

  function renderBuzzer(buzzers) {
    // Reader 0's buzzer drives the indicator (single-reader devices).
    let b = null;
    if (buzzers && buzzers.length) {
      b = buzzers.find(function (x) { return x.reader_no === 0; }) || buzzers[0];
    }
    const on = !!(b && b.sounding);
    if (on !== buzzing) { buzzing = on; applyBuzz(); }
  }

  function applyState(state) {
    render(state.leds);
    renderBuzzer(state.buzzers);
    setStatus(state.connection);
  }

  async function poll() {
    try {
      const r = await fetch('/api/state', { cache: 'no-store' });
      if (!r.ok) throw new Error('HTTP ' + r.status);
      const state = await r.json();
      applyState(state);
    } catch (e) {
      setStatusDown();
    }
  }

  // Prefer Server-Sent Events: instant push, one event per LED change, with
  // a snapshot on connect. EventSource auto-reconnects if the stream drops.
  function subscribe() {
    if (typeof EventSource === 'undefined') return;
    try {
      const es = new EventSource('/api/events');
      es.addEventListener('state', function (e) {
        try { applyState(JSON.parse(e.data)); } catch (_) {}
      });
      // No onopen handler: the snapshot-on-connect `state` event fires
      // immediately and drives the badge through applyState.
      es.onerror = function () { setStatusDown(); /* browser retries */ };
    } catch (_) { /* fall back to the poll backstop below */ }
  }

  // ---- Keypad: POST each press to the PD ----------------------------
  document.querySelectorAll('.key').forEach(function (el) {
    el.addEventListener('click', function () {
      const key = el.getAttribute('data-key');
      playKeyBeep();
      el.classList.add('pressed');
      setTimeout(function () { el.classList.remove('pressed'); }, 130);
      fetch('/api/keypad', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ key: key }),
      }).catch(function () { /* press feedback already shown */ });
    });
  });

  // ---- Card tap: POST a card read -----------------------------------
  const cardInput = document.getElementById('card');
  const tapBtn = document.getElementById('tap');
  tapBtn.addEventListener('click', function () {
    const value = (cardInput.value || '').trim();
    if (!/^[0-9]+$/.test(value) || Number(value) > 65535) {
      cardInput.focus();
      cardInput.select();
      return;
    }
    // Visual confirmation the tap registered.
    const label = tapBtn.textContent;
    tapBtn.classList.add('flash');
    tapBtn.textContent = 'Tapped ✓';
    setTimeout(function () {
      tapBtn.classList.remove('flash');
      tapBtn.textContent = label;
    }, 450);
    fetch('/api/card', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ value: value }),
    }).catch(function () {});
  });

  // ---- Status triggers: tamper + power cycle ------------------------
  // Both POST a PD status report (LSTATR). Brief on-button confirmation,
  // since neither changes the reader's LED/buzzer face — the effect is on
  // the wire to the ACU.
  function flashButton(btn, msg, ms) {
    const label = btn.dataset.label || btn.textContent;
    btn.dataset.label = label;
    btn.classList.add('flash');
    btn.textContent = msg;
    setTimeout(function () {
      btn.classList.remove('flash');
      btn.textContent = label;
    }, ms || 600);
  }

  const tamperBtn = document.getElementById('tamper');
  tamperBtn.addEventListener('click', function () {
    flashButton(tamperBtn, 'Tamper sent ✓');
    fetch('/api/tamper', { method: 'POST' }).catch(function () {});
  });

  const powerBtn = document.getElementById('power-cycle');
  powerBtn.addEventListener('click', function () {
    flashButton(powerBtn, 'Cycling…', 900);
    fetch('/api/power-cycle', { method: 'POST' })
      .then(function (r) {
        if (!r.ok) flashButton(powerBtn, 'No PD', 900);
      })
      .catch(function () {});
  });

  subscribe();
  // Backstop: prime immediately on load, then a slow poll so the page still
  // refreshes if a proxy buffers the SSE stream. Far lighter than the old
  // 250 ms poll; redundant (and harmless) when SSE is flowing.
  poll();
  setInterval(poll, 10000);
</script>
</body>
</html>
